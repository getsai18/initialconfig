spring.application.name=initialconfig

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://localhost:3306/cds_initialconfig?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# JWT - JWT_SECRET debe sobreescribirse por variable de entorno en producción,
# igual que DB_PASSWORD arriba. El valor por defecto es solo para desarrollo local.
app.jwt.secret=${JWT_SECRET:cds-initialconfig-dev-only-jwt-secret-change-me-in-production-2026}
app.jwt.access-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:480}
app.jwt.reset-expiration-minutes=${JWT_RESET_EXPIRATION_MINUTES:10}

# Semilla de administrador (creado automáticamente al arrancar si no existe)
app.admin-seed.usuario=${ADMIN_SEED_USUARIO:admin}
app.admin-seed.password=${ADMIN_SEED_PASSWORD:12345a}

# Recuperación de contraseña (código OTP)
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}

# EMAIL CONFIGURATION - SMTP_PASSWORD debe sobreescribirse por variable de entorno en producción
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
