spring.application.name=backend

# Carga backend/.env como fuente de propiedades (formato KEY=VALUE compatible
# con .properties). Sin esto, Spring Boot ignora el .env y las variables como
# ADMIN_SEED_USUARIO caen a su valor por defecto (vacio).
spring.config.import=optional:file:.env[.properties]

#server.ssl.enabled=true
#server.ssl.key-store=${SPRING_PATH_KEYSTORE}
#server.ssl.key-store-password=${SPRING_PASSWORD_KEYSTORE}
#server.ssl.key-store-type=PKCS12

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
db.host=${DB_HOST:}
db.port=${DB_PORT:}
db.name=${DB_NAME:}
db.username=${DB_USERNAME:}
db.password=${DB_PASSWORD:}

server.port=${SERVER_PORT:8080}

# Adjuntos de Pedidos/Ordenes (Gestor de Órdenes): máx. 10MB por archivo (ver AdjuntoValidator)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Orígenes permitidos por CORS, separados por coma. En dev, cualquier puerto de
# localhost; en producción debe sobreescribirse con el(los) dominio(s) real(es)
# del frontend vía la variable de entorno CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.reset-token-expiration-ms=${OTP_RESET_TOKEN_EXPIRATION_MS:600000}

# Bloqueo por intentos fallidos de login (ver security/LoginAttemptService).
app.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}

app.admin-seed.usuario=${ADMIN_SEED_USUARIO:}
app.admin-seed.password=${ADMIN_SEED_PASSWORD:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:}
